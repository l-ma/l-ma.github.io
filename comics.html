<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comic Strips</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      margin: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .comic-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .comic-item {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .comic-item img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* Layout adjustment based on orientation */
    .comic-item.landscape {
      grid-column: span 2;
    }

    .comic-item.portrait {
      grid-column: span 1;
    }

    .page-title {
  text-align: center;
  color: #555;
  margin-bottom: 5px;
}

.back-text {
  text-align: center;
  font-size: 0.8rem;
  margin-top: 0;
  margin-bottom: 20px;
}

.back-text a {
  color: #555;
  text-decoration: none;
  font-weight: normal;
}

.back-text a:hover {
  text-decoration: underline;
}

    .back-link {
      display: block;
      text-align: center;
      margin-top: 40px;
      font-size: 0.9em;
      color: #666;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

  <script>
    // Add orientation-based classes to each image
    window.addEventListener("load", () => {
      const items = document.querySelectorAll(".comic-item img");

      items.forEach(img => {
        const parent = img.parentElement;
        const tempImg = new Image();
        tempImg.src = img.src;

        tempImg.onload = () => {
          const aspect = tempImg.width / tempImg.height;
          if (aspect >= 1.2) {
            parent.classList.add("landscape");
          } else {
            parent.classList.add("portrait");
          }
        };
      });
    });
  </script>
